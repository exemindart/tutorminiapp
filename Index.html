<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUTORIAL MINI APP NFT TELEGRAM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Orbitron',sans-serif;
  background: radial-gradient(circle at top,#001f3f,#000000 70%);
  color:white;
  overflow:hidden;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* PARTICLE BACKGROUND */
canvas{
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  z-index:0;
}

/* CYBER GRID */
.grid{
  position:fixed;
  bottom:0; left:0;
  width:100%; height:50%;
  background:
    linear-gradient(rgba(0,170,255,0.15) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,170,255,0.15) 1px, transparent 1px);
  background-size:40px 40px;
  transform:perspective(500px) rotateX(60deg);
  transform-origin:bottom;
  z-index:0;
}

/* NFT SVG FLOATING */
.nft-svg{
  position:fixed;
  width:180px; height:180px;
  opacity:0.2; z-index:0;
  animation:float 12s ease-in-out infinite;
  filter: drop-shadow(0 0 50px #00aaff);
}
.n1{top:5%; left:5%; animation-delay:0s;}
.n2{top:10%; right:5%; animation-delay:2s;}
.n3{bottom:10%; left:10%; animation-delay:4s;}
.n4{bottom:15%; right:8%; animation-delay:1s;}

@keyframes float{
  0%{transform:translateY(0px) rotate(0deg);}
  50%{transform:translateY(-40px) rotate(4deg);}
  100%{transform:translateY(0px) rotate(0deg);}
}

/* CONTAINER */
.container{
  position:relative; z-index:2;
  max-width:800px;
  width:100%;
}

/* TITLE */
h1{
  font-size:38px;
  background:linear-gradient(90deg,#00f2ff,#0088ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:20px;
}
.description{
  max-width:650px; margin:auto; opacity:0.95; margin-bottom:50px; line-height:1.6;
}

/* CLEAN ICON MENU CENTERED */
.menu{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:40px;
  margin-top:40px;
  z-index:10; /* pastikan di atas NFT/canvas */
  position:relative;
}

.icon-card{
  display:flex; flex-direction:column; align-items:center;
  cursor:pointer;
  color:white; font-weight:500;
  transition: transform 0.3s, text-shadow 0.3s;
}

.icon-card svg{
  transition: transform 0.3s, filter 0.3s;
}

.icon-card:hover svg{
  transform: scale(1.2) rotate(10deg);
  filter: drop-shadow(0 0 15px #00f2ff);
}

.icon-card span{
  margin-top:8px; font-size:14px; transition:text-shadow 0.3s;
}

.icon-card:hover span{
  text-shadow:0 0 10px #00f2ff;
}

footer{
  margin-top:50px;
  opacity:0.6;
  font-size:12px;
}
</style>
</head>
<body>

<!-- PARTICLE -->
<canvas id="particles"></canvas>
<div class="grid"></div>

<!-- NFT SVG ILLUSTRATIONS -->
<svg class="nft-svg n1" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="28" fill="#00ffff"/>
  <text x="50%" y="55%" font-size="24" fill="#001f3f" text-anchor="middle" alignment-baseline="middle">🐸</text>
</svg>

<svg class="nft-svg n2" viewBox="0 0 64 64">
  <rect x="8" y="8" width="48" height="48" fill="#ff00ff" rx="8"/>
  <text x="50%" y="55%" font-size="24" fill="#001f3f" text-anchor="middle" alignment-baseline="middle">🎁</text>
</svg>

<svg class="nft-svg n3" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="28" fill="#ffff00"/>
  <text x="50%" y="55%" font-size="24" fill="#001f3f" text-anchor="middle" alignment-baseline="middle">💍</text>
</svg>

<svg class="nft-svg n4" viewBox="0 0 64 64">
  <polygon points="32,4 40,28 60,32 40,36 32,60 24,36 4,32 24,28" fill="#00ffff"/>
  <text x="50%" y="55%" font-size="24" fill="#001f3f" text-anchor="middle" alignment-baseline="middle">💎</text>
</svg>

<div class="container">
<h1>NFT TELEGRAM</h1>
<p class="description">
Website ini dibuat untuk belajar NFT Telegram dan Username Telegram.
Masuk ke ekosistem Web3, bangun networking, dan akses Mini App dalam satu platform.
</p>

<!-- CLEAN ICON MENU CENTERED WITH CLICK JS -->
<div class="menu">
<a class="icon-card" onclick="window.open('https://t.me/tutorminiapp','_blank')">
  <svg width="48" height="48" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#00f2ff" opacity="0.2"/>
    <text x="50%" y="55%" font-size="24" fill="#00f2ff" text-anchor="middle" alignment-baseline="middle">📢</text>
  </svg>
  <span>Channel</span>
</a>

<a class="icon-card" onclick="window.open('https://t.me/komuunitas','_blank')">
  <svg width="48" height="48" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#00f2ff" opacity="0.2"/>
    <text x="50%" y="55%" font-size="24" fill="#00f2ff" text-anchor="middle" alignment-baseline="middle">👥</text>
  </svg>
  <span>Grup NFT</span>
</a>

<a class="icon-card" onclick="window.open('https://t.me/usnholics','_blank')">
  <svg width="48" height="48" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#00f2ff" opacity="0.2"/>
    <text x="50%" y="55%" font-size="24" fill="#00f2ff" text-anchor="middle" alignment-baseline="middle">🔑</text>
  </svg>
  <span>Username</span>
</a>

<a class="icon-card" onclick="window.open('https://t.me/tutorminiapp/14249','_blank')">
  <svg width="48" height="48" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#00f2ff" opacity="0.2"/>
    <text x="50%" y="55%" font-size="24" fill="#00f2ff" text-anchor="middle" alignment-baseline="middle">🖱️</text>
  </svg>

<a class="icon-card" onclick="window.open('https://t.me/tutornft','_blank')">
  <svg width="48" height="48" viewBox="0 0 64 64">
    <circle cx="32" cy="32" r="30" fill="#00f2ff" opacity="0.2"/>
    <text x="50%" y="55%" font-size="24" fill="#00f2ff" text-anchor="middle" alignment-baseline="middle">📚</text>
  </svg>
  <span>Tutorial</span>
</a>
</div>

<footer>© 2025 TUTORMINIAPP | Tidak untuk dikomersialkan</footer>
</div>

<script>
// PARTICLES
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<120;i++){
  particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*2+0.5,speed:Math.random()*0.7});
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#00aaff";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
    p.y+=p.speed;
    if(p.y>canvas.height)p.y=0;
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
